name: Coletar odds (snapshots)

on:
  schedule:
    - cron: "5 * * * *"   # de hora em hora (captura a closing odds antes dos jogos)
  workflow_dispatch:        # permite rodar manualmente pela aba Actions

permissions:
  contents: write           # para commitar data/snapshots.json de volta no repo

# evita rodadas sobrepostas
concurrency:
  group: coletar-odds
  cancel-in-progress: false

jobs:
  coletar:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Coletar odds e gerar snapshots
        env:
          ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}   # opcional; sem ele, a fonte multi-casas fica de fora
        run: node scripts/collect.mjs

      - name: Publicar snapshots na branch data (sem rebuildar o Pages)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          cp data/snapshots.json "$RUNNER_TEMP/snapshots.json"
          git fetch origin data --depth=1 2>/dev/null || true
          if git rev-parse --verify origin/data >/dev/null 2>&1; then
            git checkout -B data origin/data
          else
            git checkout --orphan data
            git rm -rf . >/dev/null 2>&1 || true
          fi
          cp "$RUNNER_TEMP/snapshots.json" snapshots.json
          git add snapshots.json
          if git diff --staged --quiet; then
            echo "Nenhuma mudança nos snapshots."
          else
            git commit -m "Snapshots automáticos de odds"
            git push origin data
          fi
