name: Coletar odds (snapshots)

on:
  schedule:
    - cron: "5 * * * *"   # de hora em hora (captura a closing odds antes dos jogos)
  workflow_dispatch:        # permite rodar manualmente pela aba Actions

permissions:
  contents: write           # para commitar data/snapshots.json de volta no repo

# evita rodadas sobrepostas
concurrency:
  group: coletar-odds
  cancel-in-progress: false

jobs:
  coletar:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Coletar odds e gerar snapshots
        env:
          ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}   # opcional; sem ele, a fonte multi-casas fica de fora
        run: node scripts/collect.mjs

      - name: Commitar se houver mudança
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/snapshots.json
          if git diff --staged --quiet; then
            echo "Nenhuma mudança nos snapshots."
          else
            git commit -m "Snapshots automáticos de odds [skip ci]"
            git push
          fi
